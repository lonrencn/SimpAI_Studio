<h4>遮罩模式</h4>
<table>
    <tr><td><kbd>点击 + 拖动</kbd></td><td>在遮罩上绘制</td></tr>
    <tr><td><kbd>中键 + 拖动</kbd></td><td>平移画布视图</td></tr>
    <tr><td><kbd>鼠标滚轮</kbd></td><td>放大/缩小视图</td></tr>
    <tr><td><strong>画笔控制</strong></td><td>使用滑块控制画笔 <strong>大小</strong>, <strong>强度</strong>, 和 <strong>硬度</strong></td></tr>
    <tr><td><strong>清除遮罩</strong></td><td>移除整个遮罩</td></tr>
    <tr><td><strong>退出模式</strong></td><td>再次点击 "绘制遮罩" 按钮</td></tr>
</table>
