<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="360" viewBox="0 0 1040 360" role="img" aria-label="SCAIL2 scheduled segment flow">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .a { fill: #2563eb; }
      .b { fill: #16a34a; }
      .c { fill: #f59e0b; }
      .txt { fill: #e5e7eb; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
      .small { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .line { stroke: #94a3b8; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect class="bg" width="1040" height="360" />
  <rect class="panel" x="30" y="38" width="980" height="280" />
  <text class="txt" x="64" y="86">Scheduled long-video generation</text>
  <rect class="a" x="78" y="134" width="240" height="76" rx="12" />
  <text class="txt" x="108" y="181">Segment 1</text>
  <text class="small" x="108" y="236">reference_1 + prompt_1</text>
  <line class="line" x1="336" y1="172" x2="430" y2="172" />
  <rect class="b" x="450" y="134" width="240" height="76" rx="12" />
  <text class="txt" x="480" y="181">Segment 2</text>
  <text class="small" x="480" y="236">reference_2 + prompt_2</text>
  <line class="line" x1="708" y1="172" x2="802" y2="172" />
  <rect class="c" x="822" y="134" width="130" height="76" rx="12" />
  <text class="txt" x="852" y="181">More</text>
  <text class="small" x="852" y="236">up to 8 refs</text>
  <text class="small" x="78" y="284">Boundary overlap controls how much of the previous segment is used as continuation context.</text>
</svg>
